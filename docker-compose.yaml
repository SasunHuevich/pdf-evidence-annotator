services:
  qdrant:
    image: qdrant/qdrant:v1.18.1
    restart: always
    container_name: qdrant
    environment:
      QDRANT__logger__level: INFO
      QDRANT__SERVICE__MAX_REQUEST_SIZE_MB: 32
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
      - ./qdrant_snapshots:/qdrant/snapshots
    command: [ "./qdrant", "--snapshot", "/qdrant/snapshots/documents-8701467761372368-2026-05-21-05-56-38.snapshot:documents", "--force-snapshot" ]
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 8gb

  back:
    build: ./backend/
    restart: always
    container_name: pea_back
    depends_on:
      - qdrant
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/db
      - RUST_LOG=info
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  # TODO(petrov): 
  # frontend:


volumes:
  qdrant_storage:
